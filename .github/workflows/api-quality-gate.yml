name: API quality gate

on:
  pull_request:
    branches:
      - main
    paths:
      - "05-engineering/**"
      - ".github/workflows/api-quality-gate.yml"
  workflow_dispatch:

concurrency:
  group: api-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-quality-gate:
    name: Test API + critical eval gate
    runs-on: ubuntu-latest
    # Guardrail ceiling — a healthy run is well under this; the bound only
    # exists so a hung install/test/eval can't pin a runner indefinitely.
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 05-engineering/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: 05-engineering

      - name: Build shared packages
        run: npm run build:packages
        working-directory: 05-engineering

      - name: Run API tests
        run: npm run test:api
        working-directory: 05-engineering

      - name: Run critical hard-fail suite
        run: npm run eval:critical --workspace=@tempo/api
        working-directory: 05-engineering

      # Hermetic dashboard quality gate (golden + spanish-recall +
      # elections-colombia + embed-floor calibration). No provider keys, no
      # network — runs the cores in-process and fails closed on any regression.
      # Also persists the calibration sweep as a JSON artifact (uploaded below).
      - name: Run dashboard quality gate
        run: npm run eval:dashboard-quality-gate --workspace=@tempo/api
        working-directory: 05-engineering

      # Capture the calibration sweep artifact even when an earlier step failed,
      # so a regressed gate is debuggable from the run. The gate runner resolves
      # its default `.artifacts/` path against the @tempo/api workspace cwd.
      - name: Upload dashboard calibration artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-calibration
          path: 05-engineering/apps/api/.artifacts/*.json
          if-no-files-found: warn
