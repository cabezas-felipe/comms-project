name: Ingestion cache warmer

# Phase 1 Slice 4 — keeps the `ingestion_recent_items` Tier-A cache warm so
# interactive refreshes hit the cache instead of paying the live-fetch latency.
#
# Cadence: hourly at :35.  Offset from the cadence-tick workflow (:05) so the
# two scheduled jobs don't contend for the same top-of-hour runner capacity.
# The warm is a full-manifest fetch (no per-user feedIds scoping) — its whole
# job is to populate the cache for every active feed ahead of demand.
#
# Behavior:
#   - Calls `node apps/api/src/ops/ingestion-warm.mjs`, which fetches every
#     active manifest feed via `readFeedItems(dataDir)` (no feedIds) and
#     upserts the mapped items via `writeRecentItems({ supabase, items })`.
#   - Structured summary log line is `[ingestion-warm] {…}` (single-line JSON).
#     Grep the workflow run output for `[ingestion-warm]` to read summary
#     fields: ok, startedAt, itemCount, feedCount, written, durationMs, and
#     skippedReason (present only on failure).
#
# Phase 3 — X (social) warm (additive):
#   - After the RSS warm, the script optionally warms a configured list of X
#     handles into the SAME Tier-A cache so interactive refreshes serve social
#     handles from cache too. Two gates, both required: (1) X is enabled
#     (TEMPO_X_INGESTION_ENABLED=true AND a bearer token is present), and (2)
#     TEMPO_X_WARM_HANDLES is a non-empty comma-separated handle list.
#   - When either gate is off, X warm is skipped and the run stays an RSS-only
#     success — so a missing bearer secret never fails the warmer.
#   - Additive `[ingestion-warm]` summary fields: xEnabled, xHandlesWarmed,
#     xItemCount, xWritten. Confirm a live X warm by grepping for xItemCount > 0.
#
# Exit-code semantics:
#   - Exit `0` on success — including a clean warm of zero items (an empty
#     manifest is not a failure) and an RSS-only run where X warm was skipped.
#   - Exit `1` on fatal errors only: missing supabase env, supabase client
#     construction failed, the live read threw, the cache write threw / returned
#     an error envelope, OR — once X warm is ATTEMPTED (enabled + handles set) —
#     the X read threw / the X write threw / the X write returned an error
#     envelope. `skippedReason` in the log names which one (RSS:
#     missing_supabase_env / supabase_client_failed / read_threw / write_threw /
#     write_error; X: x_read_threw / x_write_threw / x_write_error).
#
# Secrets / variables (repo Settings → Secrets and variables → Actions):
#   - Secret  SUPABASE_URL              — required (service-role write target).
#   - Secret  SUPABASE_SERVICE_ROLE_KEY — required (warmer writes as service role).
#   - Secret  TEMPO_X_BEARER_TOKEN      — optional; enables X warm. Absent ⇒ RSS-only.
#   - Variable TEMPO_X_WARM_HANDLES     — optional; comma-separated pilot handles
#                                         (a repo VARIABLE, not a secret — it is
#                                         not sensitive). Unset/empty ⇒ X warm skipped.
#   The warm exits `1` with skippedReason="missing_supabase_env" if either
#   SUPABASE_* is absent, so that failure surface stays loud.
#
# Troubleshooting:
#   - On `skippedReason=write_error` / `x_write_error` (or any failure) the
#     `[ingestion-warm]` line's `error` field carries the serialized supabase
#     error (message/code/details/hint).  See the operator checklist in
#     05-engineering/docs/runbook-ingestion-warm.md.

on:
  schedule:
    - cron: "35 * * * *"
  workflow_dispatch:

# Serialize warms — never let a slow run overlap the next hourly fire (or a
# manual dispatch), since both upsert the same shared ingestion_recent_items
# cache. cancel-in-progress: false → a mid-flight warm always finishes; the
# next is queued.
concurrency:
  group: ingestion-warm
  cancel-in-progress: false

jobs:
  ingestion-warm:
    name: Warm ingestion_recent_items cache
    runs-on: ubuntu-latest
    # Guardrail ceiling — bounds a hung warm; a healthy run is far under, and
    # the next hourly warm repopulates the cache regardless.
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: 05-engineering/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: 05-engineering

      - name: Run ingestion warm
        run: |
          echo "[ingestion-warm] Run started at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          node apps/api/src/ops/ingestion-warm.mjs
        working-directory: 05-engineering
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Phase 3 X (social) warm. Opt-in: X warm only runs when the bearer
          # secret is present AND TEMPO_X_WARM_HANDLES (repo variable) is set.
          # With the bearer secret absent the script reads X as disabled and
          # warms RSS only (no failure). TEMPO_X_WARM_HANDLES is a repo VARIABLE
          # (not a secret) — the pilot handle list is not sensitive.
          TEMPO_X_INGESTION_ENABLED: "true"
          TEMPO_X_BEARER_TOKEN: ${{ secrets.TEMPO_X_BEARER_TOKEN }}
          TEMPO_X_WARM_HANDLES: ${{ vars.TEMPO_X_WARM_HANDLES }}
