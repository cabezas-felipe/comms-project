name: Daily source digest

on:
  schedule:
    # 09:00 UTC daily
    - cron: "0 9 * * *"
  # Allow manual runs from the Actions tab (no inputs needed)
  workflow_dispatch:

jobs:
  digest:
    name: Send net-new source digest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: 05-engineering/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: 05-engineering

      - name: Run digest
        run: node apps/api/src/ops/source-delta-digest.mjs
        working-directory: 05-engineering
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOURCE_DIGEST_SLACK_WEBHOOK_URL: ${{ secrets.SOURCE_DIGEST_SLACK_WEBHOOK_URL }}
